apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-k8s
  namespace: argocd
spec:
  source:
    repoURL: http://git.internal/konstaka/homelab.git
    path: helloworld
    targetRevision: HEAD
  destination:
    namespace: helloworld
    server: https://kubernetes.default.svc
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
