apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  source:
    repoURL: http://git.internal/konstaka/homelab.git
    path: argocd
    targetRevision: HEAD
    helm:
      valueFiles:
        - environments/values-alpha.yaml
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
