apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  source:
    repoURL: http://192.168.3.102:3000/appelstroopwafel/homelab.git
    path: argocd
    targetRevision: HEAD
    helm:
      valueFiles:
        - environments/values-beta.yaml
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
