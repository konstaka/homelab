apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: toolbox
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  source:
    repoURL: http://192.168.3.102:3000/appelstroopwafel/homelab.git
    path: toolbox
    targetRevision: HEAD
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
