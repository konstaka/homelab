apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: toolbox
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - cluster: alpha
            url: https://kube.cluster-alpha.home.arpa:6443
          - cluster: beta
            url: https://kubernetes.default.svc
  template:
    metadata:
      name: "toolbox-{{ .cluster }}"
    spec:
      project: default
      source:
        repoURL: http://192.168.3.102:3000/appelstroopwafel/homelab.git
        path: toolbox
        targetRevision: HEAD
      destination:
        namespace: default
        server: "{{ .url }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
