apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  source:
    repoURL: http://dock.internal/konstaka/homelab.git
    path: root-app
    targetRevision: HEAD
    helm:
      valueFiles:
        - "values.yaml"
        - "environments/values-{{ .Values.cluster }}.yaml"
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
