apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cronjobs
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  source:
    repoURL: http://dock.internal/konstaka/homelab.git
    path: cronjobs
    targetRevision: HEAD
    helm:
      valueFiles:
        - "values.yaml"
        - "environments/values-{{ .Values.cluster }}.yaml"
  destination:
    namespace: cronjobs
    server: https://kubernetes.default.svc
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
