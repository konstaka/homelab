apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cronjobs
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - list:
        elements:
          - cluster: alpha
            url: https://kube.cluster-alpha.home.arpa:6443
          - cluster: beta
            url: https://kubernetes.default.svc
  template:
    metadata:
      name: "cronjobs-{{`{{ .cluster }}`}}"
    spec:
      project: default
      source:
        repoURL: http://192.168.3.102:3000/appelstroopwafel/homelab.git
        path: cronjobs
        targetRevision: HEAD
      destination:
        namespace: cronjobs
        server: "{{`{{ .url }}`}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
