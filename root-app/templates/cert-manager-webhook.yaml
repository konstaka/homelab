apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-webhook
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: http://192.168.3.102:3000/appelstroopwafel/homelab.git
    path: cert-manager-webhook
    targetRevision: HEAD
  destination:
    namespace: cert-manager
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
