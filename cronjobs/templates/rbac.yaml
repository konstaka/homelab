apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: "{{ .Values.namespace }}-cluster-role"
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "delete"]
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - list
      - get
      - delete
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: "{{ .Values.namespace }}-binding"
subjects:
  - kind: ServiceAccount
    name: default
    namespace: "{{ .Values.namespace }}"
roleRef:
  kind: ClusterRole
  name: "{{ .Values.namespace }}-cluster-role"
  apiGroup: rbac.authorization.k8s.io
